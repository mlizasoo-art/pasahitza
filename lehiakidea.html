<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehiakidea · PASAHITZA</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#FAFAFA;--surface:#FFF;--text:#0A0A0A;--text2:#737373;--border:#E5E5E5;--accent:#2563EB;--ok:#10B981;--error:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none}.screen.active{display:flex;flex-direction:column;min-height:100vh}
.layout{max-width:600px;margin:0 auto;padding:2rem;width:100%}
.inicio{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.inicio-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:3rem 2rem;max-width:500px;width:100%;text-align:center}
.inicio-h{font-size:1.75rem;font-weight:700;margin-bottom:1rem}
.inicio-p{color:var(--text2);margin-bottom:2rem;line-height:1.5}
.form-g{display:flex;flex-direction:column;gap:1rem}
.input{width:100%;padding:1rem 1.25rem;font-size:1rem;border:2px solid var(--border);border-radius:10px;font-family:inherit;background:var(--surface);transition:border .15s}
.input:focus{outline:0;border-color:var(--accent)}
.hint{font-size:.85rem;color:var(--text2);margin-top:.25rem}
.btn{background:var(--accent);color:#fff;border:0;padding:1rem 1.5rem;font-size:1rem;font-weight:600;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%}
.btn:hover:not(:disabled){background:#1D4ED8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-box{background:#FEE2E2;border:1px solid #FECACA;color:#DC2626;padding:1rem 1.25rem;border-radius:10px;margin-bottom:1.5rem;font-size:.95rem;display:none}
.game{display:flex;flex-direction:column;padding:2rem 1rem}
.game-h{text-align:center;margin-bottom:2rem}
.game-status{font-size:.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;font-weight:600}
.game-title{font-size:2rem;font-weight:700}
.game-name{font-size:.95rem;color:var(--text2);margin-top:.5rem}
.rosco-container{flex:1;display:flex;align-items:center;justify-content:center;margin-bottom:2rem}
.rosco{width:min(100vw,500px);height:min(100vw,500px);position:relative}
.rosco-seg{position:absolute;width:100%;height:100%;left:0;top:0}
.seg-letter{position:absolute;width:40px;height:40px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .15s;user-select:none}
.seg-letter:hover:not(.ok):not(.error){border-color:var(--accent);transform:scale(1.1)}
.seg-letter.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.seg-letter.error{background:var(--error);color:#fff;border-color:var(--error)}
.seg-letter.pending{background:var(--accent);color:#fff;border-color:var(--accent)}
.game-input{width:100%;padding:1.25rem 1.5rem;font-size:1.1rem;border:2px solid var(--border);border-radius:12px;font-family:inherit;background:var(--surface);text-align:center;text-transform:uppercase;letter-spacing:.05em;font-weight:600;transition:border .15s}
.game-input:focus{outline:0;border-color:var(--accent)}
.btn-check{background:var(--accent);color:#fff;border:0;padding:1rem;font-size:1rem;font-weight:600;border-radius:10px;cursor:pointer;font-family:inherit;width:100%;margin-top:1rem;transition:all .15s}
.btn-check:hover:not(:disabled){background:#1D4ED8}
.btn-check:disabled{opacity:.5;cursor:not-allowed}
.q-type{font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.q-type.hasiera{color:var(--accent)}
.q-type.itsatsia{color:#D97706}
.feedback{margin-top:1rem;padding:1rem;border-radius:8px;font-weight:600;text-align:center;display:none;font-size:1.05rem}
.feedback.ok{display:block;background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0}
.feedback.error{display:block;background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
.status-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem;text-align:center}
.status-title{font-size:.9rem;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;font-weight:600}
.status-value{font-size:2rem;font-weight:700;font-family:monospace}
.loading{text-align:center;color:var(--text2);padding:3rem 2rem}
.loading-dot{display:inline-block;width:6px;height:6px;background:currentColor;border-radius:50%;margin:0 2px;animation:bounce .6s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{transform:translateY(0)},50%{transform:translateY(-8px)}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-label{font-size:.85rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.stat-value{font-size:1.75rem;font-weight:700;font-family:monospace}
@media(max-width:600px){.rosco{width:min(90vw,300px);height:min(90vw,300px)}.seg-letter{width:32px;height:32px;font-size:.8rem}}
</style>
</head>
<body>

<div class="screen active" id="s1">
  <div class="inicio">
    <div class="inicio-card">
      <h1 class="inicio-h">PASAHITZA</h1>
      <p class="inicio-p">Sartu zure izena eta saioen kodea</p>
      <form class="form-g" id="join-form" onsubmit="joinGame(event)">
        <div>
          <input type="text" id="name" class="input" placeholder="Zure izena" maxlength="50" required>
          <div class="hint">Ikaslearen izena</div>
        </div>
        <div>
          <input type="text" id="code" class="input" placeholder="Saioen kodea" maxlength="6" style="text-transform:uppercase;letter-spacing:.1em" required>
          <div class="hint">Koordinatzaileak emana (4-6 letrak)</div>
        </div>
        <button type="submit" class="btn" id="join-btn">Sartu</button>
      </form>
      <div id="err" class="error-box"></div>
    </div>
  </div>
</div>

<div class="screen" id="s2">
  <div class="game">
    <div class="game-h">
      <div class="game-status" id="status">Itxaroten</div>
      <h1 class="game-title" id="title">—</h1>
      <div class="game-name" id="myname">—</div>
    </div>
    <div class="stats" style="display:grid">
      <div class="stat" style="background:var(--surface);border:2px solid var(--border);padding:1.2rem"><div class="stat-label" style="font-size:.9rem;font-weight:600">Puntuak</div><div class="stat-value" id="pts" style="font-size:2rem;color:var(--accent)">0</div></div>
      <div class="stat" style="background:var(--surface);border:2px solid var(--border);padding:1.2rem"><div class="stat-label" style="font-size:.9rem;font-weight:600">Denbora</div><div class="stat-value" id="tm" style="font-size:2rem;font-weight:700;color:#DC2626">10:00</div></div>
    </div>
    <div id="waiting" class="status-box"><div class="status-title">Itxaroten</div><p style="color:var(--text2);margin-top:.5rem">Koordinatzaileak saioa hasten du…</p></div>
    <div id="answer" style="display:none">
      <div class="rosco-container"><div class="rosco" id="rosco"></div></div>
      <div id="q" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
          <div style="background:var(--accent);color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.75rem;flex-shrink:0" id="qletter">A</div>
          <div style="flex:1">
            <div class="q-type hasiera" id="qtype">HASIERA</div>
            <div style="font-size:.85rem;color:var(--text2);margin-top:.25rem">Letra honekin hasten den hitza</div>
          </div>
        </div>
        <div style="font-size:1.1rem;font-weight:500;margin-bottom:1rem;padding:1rem;background:var(--bg);border-radius:8px" id="qtext">—</div>
        <input type="text" id="ans" class="game-input" placeholder="Erantzuna" autocomplete="off">
        <div class="feedback" id="feedback"></div>
      </div>
      <div style="display:flex;gap:.75rem">
        <button class="btn-check" id="pass" onclick="passQuestion()" style="background:var(--text2);flex:1">Pasapalabra</button>
        <button class="btn-check" id="check" onclick="checkAnswer()" style="flex:2">Erantzun</button>
      </div>
    </div>
  </div>
</div>

<script>
let db=null;
let firebaseReady=false;

const APP={
  saioId:null,
  userName:null,
  userId:null,
  gurpila:null,
  startTime:null,
  timerInterval:null,
  estadoListener:null,
  questionIndex:0,
  answered:[],
  currentAnswer:null
};

let initAttempts=0;

function waitForFirebase(){
  if(typeof firebase==='undefined'||!firebase.database){
    if(initAttempts<30){
      initAttempts++;
      setTimeout(waitForFirebase,200);
    }
    return;
  }
  
  try{
    const firebaseConfig={apiKey:"AIzaSyAyYzA5YwXHGAzF8WxR7sajbXmbbMavYNQ",authDomain:"pasahitza-e4435.firebaseapp.com",databaseURL:"https://pasahitza-e4435-default-rtdb.europe-west1.firebasedatabase.app",projectId:"pasahitza-e4435",storageBucket:"pasahitza-e4435.firebasestorage.app",messagingSenderId:"457685898301",appId:"1:457685898301:web:f3db124e0a746357cec654"};
    
    if(!firebase.apps||firebase.apps.length===0){
      firebase.initializeApp(firebaseConfig);
    }
    
    db=firebase.database();
    firebaseReady=true;
    console.log('✓ Firebase listo');
  }catch(e){
    console.error('Firebase error:',e);
    if(initAttempts<30){
      initAttempts++;
      setTimeout(waitForFirebase,500);
    }
  }
}

function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;
  el.style.display='block';
  setTimeout(()=>{el.style.display='none'},5000);
}

async function joinGame(ev){
  ev.preventDefault();
  
  const name=document.getElementById('name').value.trim();
  const code=document.getElementById('code').value.trim().toUpperCase();
  
  if(!name||!code){showErr('Bete itzazu eremu guztiak');return}
  
  // Esperar a que Firebase esté listo
  if(!db){
    for(let i=0;i<20;i++){
      await new Promise(r=>setTimeout(r,100));
      if(db)break;
    }
  }
  
  if(!db){
    showErr('Firebase ez dago prest. Berr saiatu.');
    return;
  }
  
  document.getElementById('join-btn').disabled=true;
  
  try{
    const snap=await db.ref('saioak/'+code).once('value');
    if(!snap.exists()){
      showErr('Saioak kodea ez da egokia');
      document.getElementById('join-btn').disabled=false;
      return;
    }
    
    const saioa=snap.val();
    if(!saioa.gurpila_id){
      showErr('Saioa ez dago ondo konfiguratuta');
      document.getElementById('join-btn').disabled=false;
      return;
    }
    
    APP.saioId=code;
    APP.userName=name;
    APP.userId='user_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
    APP.gurpila=saioa;
    
    document.getElementById('title').textContent=saioa.gurpila_izena;
    document.getElementById('myname').textContent=name;
    
    await db.ref('saioak/'+code+'/lehiakideak/'+APP.userId).set({
      izena:name,
      puntuak:0,
      denbora:0,
      amaituta:false
    });
    
    setupListeners();
    show('s2');
  }catch(e){
    console.error('Join error:',e);
    showErr('Konexio akatsa: '+e.message);
    document.getElementById('join-btn').disabled=false;
  }
}

function setupListeners(){
  const estadoRef=db.ref('saioak/'+APP.saioId+'/egoera');
  APP.estadoListener=estadoRef.on('value',snap=>{
    const estado=snap.val();
    if(estado==='jokoan'&&!APP.startTime){
      APP.startTime=Date.now();
      startGame();
    }
  });
}

function startGame(){
  document.getElementById('status').textContent='JOKOAN';
  document.getElementById('waiting').style.display='none';
  document.getElementById('answer').style.display='block';
  document.getElementById('tm').textContent='10:00'; // Inicializar countdown
  document.getElementById('pts').textContent='0'; // Inicializar puntos
  APP.answered=[];
  APP.questionIndex=0;
  showQuestion();
  startTimer();
}

function showQuestion(){
  // Si ya respondió todas las preguntas, terminar
  const totalUniqueAnswers = APP.answered.filter((v,i,a)=>a.findIndex(t=>t.letra===v.letra)===i).length;
  if(totalUniqueAnswers>=APP.gurpila.galderak.length){
    finishGame();
    return;
  }
  
  // Si llegó al final del array, volver al principio (dar la vuelta)
  if(APP.questionIndex>=APP.gurpila.galderak.length){
    APP.questionIndex=0;
  }
  
  // Saltar preguntas ya respondidas
  while(APP.questionIndex<APP.gurpila.galderak.length){
    const q=APP.gurpila.galderak[APP.questionIndex];
    const alreadyAnswered=APP.answered.find(a=>a.letra===q.hizkia && !a.passed);
    if(!alreadyAnswered) break;
    APP.questionIndex++;
    if(APP.questionIndex>=APP.gurpila.galderak.length) APP.questionIndex=0; // Dar vuelta
  }
  
  const q=APP.gurpila.galderak[APP.questionIndex];
  const tipo=q.itsatsia?'ITSATSIA':'HASIERA';
  document.getElementById('qletter').textContent=q.hizkia;
  document.getElementById('qtype').textContent=tipo;
  document.getElementById('qtype').className=q.itsatsia?'q-type itsatsia':'q-type hasiera';
  document.getElementById('qtext').textContent=q.definizioa;
  document.getElementById('ans').value='';
  document.getElementById('ans').disabled=false;
  document.getElementById('check').disabled=false;
  document.getElementById('pass').disabled=false;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').textContent='';
  document.getElementById('ans').focus();
  APP.currentAnswer=q.hitza.toUpperCase();
}

function checkAnswer(){
  try{
    const ans=document.getElementById('ans').value.trim().toUpperCase();
    if(!ans){return}
    
    const q=APP.gurpila.galderak[APP.questionIndex];
    const correctWord=q.hitza.toUpperCase();
    
    console.log('Respuesta:', ans, 'Correcta:', correctWord);
    
    // Normalizar: eliminar sufijos de plural y artículo determinado
    function normalize(word){
      // Eliminar "AK" (plural + artículo): liburuak → liburu
      if(word.length>4 && word.endsWith('AK')){
        return word.slice(0,-2);
      }
      // Eliminar "K" (plural): liburuk → liburu, zatiketak → zatiketa
      if(word.length>3 && word.endsWith('K')){
        return word.slice(0,-1);
      }
      // Eliminar "A" (artículo): liburua → liburu
      if(word.length>3 && word.endsWith('A')){
        return word.slice(0,-1);
      }
      return word;
    }
    
    // Aceptar con o sin artículo determinado / plural
    const correct=(ans===correctWord)||(normalize(ans)===normalize(correctWord));
    
    console.log('¿Correcta?', correct, 'normalize(ans):', normalize(ans), 'normalize(correct):', normalize(correctWord));
    
    document.getElementById('ans').disabled=true;
    document.getElementById('check').disabled=true;
    document.getElementById('pass').disabled=true;
    
    const fb=document.getElementById('feedback');
    if(!fb){
      console.error('Elemento feedback no encontrado!');
      return;
    }
    
    if(correct){
      APP.answered.push({ok:true,letra:q.hizkia});
      const pts=APP.answered.filter(a=>a.ok).length;
      document.getElementById('pts').textContent=pts;
      try{updateFirebase(pts)}catch(e){console.error('Firebase error:',e)}
      fb.className='feedback ok';
      fb.textContent='✓ Zuzena! '+q.hitza;
      console.log('Feedback mostrado: CORRECTO');
    }else{
      APP.answered.push({ok:false,letra:q.hizkia});
      fb.className='feedback error';
      fb.textContent='✗ Okerra. Erantzun zuzena: '+q.hitza;
      console.log('Feedback mostrado: INCORRECTO');
    }
    
    APP.questionIndex++;
    console.log('Avanzando a pregunta', APP.questionIndex, 'en 1.5s');
    setTimeout(showQuestion,1500);
  }catch(e){
    console.error('Error en checkAnswer:', e);
    alert('Error: '+e.message);
  }
}

function passQuestion(){
  // Simplemente avanzar a la siguiente pregunta
  // No marcar como respondida - podrá volver después
  APP.questionIndex++;
  showQuestion();
}

function startTimer(){
  APP.timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-APP.startTime)/1000);
    const remaining=Math.max(0, 600-elapsed); // Countdown desde 10 minutos
    const m=Math.floor(remaining/60);
    const s=(remaining%60).toString().padStart(2,'0');
    document.getElementById('tm').textContent=`${m}:${s}`;
    document.getElementById('tm').style.color=remaining<60?'#DC2626':'inherit'; // Rojo último minuto
    updateFirebase(null,elapsed);
    if(remaining===0){
      finishGame(); // Termina automáticamente al llegar a 0
    }
  },1000);
}

function updateFirebase(pts,tm){
  if(!APP.saioId||!APP.userId){
    console.error('No saioId o userId:', APP.saioId, APP.userId);
    return;
  }
  const updates={};
  if(pts!==undefined && pts!==null)updates.puntuak=pts;
  if(tm!==undefined && tm!==null)updates.denbora=tm;
  if(Object.keys(updates).length>0){
    console.log('🔥 Actualizando Firebase:', 'saioak/'+APP.saioId+'/lehiakideak/'+APP.userId, updates);
    db.ref('saioak/'+APP.saioId+'/lehiakideak/'+APP.userId).update(updates)
      .then(()=>console.log('✅ Firebase actualizado correctamente'))
      .catch(e=>console.error('❌ Error Firebase:',e));
  }
}

function finishGame(){
  clearInterval(APP.timerInterval);
  if(APP.estadoListener)APP.estadoListener.off();
  const pts=APP.answered.filter(a=>a.ok).length;
  const elapsed=Math.floor((Date.now()-APP.startTime)/1000);
  
  db.ref('saioak/'+APP.saioId+'/lehiakideak/'+APP.userId).update({
    puntuak:pts,
    denbora:elapsed,
    amaituta:true
  }).catch(e=>console.error(e));
  
  document.getElementById('check').style.display='none';
  document.getElementById('answer').innerHTML='<div class="status-box" style="margin-top:2rem"><div class="status-title">Bukatua!</div><p style="font-size:1.5rem;font-weight:700;margin-top:1rem">'+pts+' puntu</p></div>';
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.addEventListener('beforeunload',()=>{
  if(APP.estadoListener)APP.estadoListener.off();
  if(APP.saioId&&APP.userId){
    db.ref('saioak/'+APP.saioId+'/lehiakideak/'+APP.userId).remove().catch(e=>console.error(e));
  }
});

waitForFirebase();

// Enter para enviar respuesta
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('ans').addEventListener('keypress',(e)=>{
    if(e.key==='Enter'&&!document.getElementById('check').disabled){
      checkAnswer();
    }
  });
});
</script>
</body>
</html>
