<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irakaslea · PASAHITZA</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
:root{--bg:#FAFAFA;--surface:#FFF;--text:#0A0A0A;--text2:#737373;--border:#E5E5E5;--accent:#2563EB;--ok:#10B981;--error:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.5rem;font-weight:700}
.header-a{display:flex;gap:1rem;align-items:center}
.mode-switch{display:flex;gap:.5rem;background:var(--bg);border-radius:8px;padding:.25rem}
.mode-btn{background:0;border:0;padding:.75rem 1.25rem;cursor:pointer;border-radius:6px;font-weight:600;font-size:.9rem;transition:all .15s;color:var(--text2)}
.mode-btn.active{background:var(--accent);color:#fff}
.layout{max-width:1400px;margin:0 auto;padding:2rem;width:100%}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:2rem}
.screen{display:none}.screen.active{display:block}
.list-section h2{font-size:1.25rem;font-weight:700;margin-bottom:1.5rem}
.gurpila-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;cursor:pointer;transition:all .15s}
.gurpila-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.gurpila-h{display:flex;justify-content:space-between;align-items:start;margin-bottom:0.75rem}
.gurpila-n{font-size:1.1rem;font-weight:700}
.gurpila-desc{color:var(--text2);font-size:.9rem;margin-bottom:0.75rem}
.gurpila-meta{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--text2)}
.btn-small{background:0;border:0;color:var(--text2);cursor:pointer;padding:0.5rem;font-size:.85rem;transition:color .15s}
.btn-small:hover{color:var(--text)}
.btn-del:hover{color:var(--error)}
.form-section h2{font-size:1.25rem;font-weight:700;margin-bottom:1.5rem}
.form-g{display:flex;flex-direction:column;gap:1rem}
.form-field{display:flex;flex-direction:column;gap:.5rem}
.form-field label{font-size:.9rem;font-weight:600;color:var(--text2)}
.input{width:100%;padding:0.75rem 1rem;font-size:.95rem;border:1px solid var(--border);border-radius:8px;font-family:inherit}
.input:focus{outline:0;border-color:var(--accent)}
.questions{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1rem}
.questions h3{font-size:1rem;font-weight:700;margin-bottom:1rem}
.q-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:0.75rem;display:grid;grid-template-columns:40px 1fr auto;gap:1rem;align-items:center}
.q-letter{background:var(--accent);color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem}
.q-content{display:flex;flex-direction:column;gap:.25rem}
.q-content-l{font-weight:600}
.q-content-s{color:var(--text2);font-size:.85rem}
.q-del-btn{background:0;border:0;color:var(--error);cursor:pointer;padding:.5rem;font-size:.9rem}
.add-q{background:var(--accent);color:#fff;border:0;padding:0.75rem 1rem;font-size:.9rem;font-weight:600;border-radius:8px;cursor:pointer;width:100%;margin-top:1rem}
.add-q:hover{background:#1D4ED8}
.buttons{display:flex;gap:1rem;margin-top:2rem}
.btn{background:var(--accent);color:#fff;border:0;padding:1rem 1.5rem;font-size:1rem;font-weight:600;border-radius:10px;cursor:pointer;flex:1}
.btn:hover{background:#1D4ED8}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:0;color:var(--text2);border:0;padding:.5rem 1rem;flex:0}
.msg{padding:1rem 1.5rem;border-radius:10px;margin-bottom:1.5rem;display:none}
.msg.ok{background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0}
.msg.error{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
.msg.show{display:block}
.file-inp{display:none}
.coord-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.coord-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;cursor:pointer;transition:all .15s}
.coord-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.coord-card h3{font-size:1.25rem;font-weight:600;margin-bottom:0.5rem}
.coord-card p{color:var(--text2);font-size:.875rem;margin-bottom:1rem}
.coord-card-meta{display:flex;justify-content:space-between;font-size:.8rem;color:#A3A3A3}
.pres{background:var(--surface);border-radius:16px;padding:2rem;margin-bottom:2rem}
.pres-h{text-align:center;margin-bottom:2rem}
.pres-title{font-size:2.5rem;font-weight:800}
.pres-cnt{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.pres-qr{text-align:center}
.pres-qr-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;display:inline-block;margin-bottom:1rem}
.pres-qr-box canvas{display:block;width:200px;height:200px}
.pres-url{font-size:1rem;font-family:monospace;background:var(--bg);border:1px solid var(--border);padding:0.75rem 1rem;border-radius:8px;display:inline-block;font-weight:600;margin-bottom:1rem}
.code-box{background:var(--text);color:#fff;padding:1.5rem 2rem;border-radius:12px;text-align:center;margin-bottom:1rem}
.code-label{font-size:.8rem;opacity:.7;text-transform:uppercase;letter-spacing:.15em;margin-bottom:.5rem}
.code{font-size:2.5rem;font-weight:800;font-family:monospace;letter-spacing:.05em}
.coord-rules{display:flex;flex-direction:column;gap:1rem}
.rule{display:flex;gap:1rem;align-items:flex-start}
.rule-num{background:var(--accent);color:#fff;width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0}
.rule-txt{font-size:.95rem;line-height:1.3}
.ranking{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2rem}
.r-empty{padding:2rem 1.5rem;text-align:center;color:var(--text2)}
.r-row{display:grid;grid-template-columns:3rem 1fr auto auto auto;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);gap:1rem}
.r-row:last-child{border-bottom:none}
.r-pos{font-size:1.1rem;font-weight:700;color:var(--text2);text-align:center}
.r-name{font-weight:600}
.r-pts{font-weight:700}
.r-time{font-size:.85rem;color:var(--text2);font-family:monospace}
.modal-o{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-o.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:2rem;max-width:480px;width:100%}
.modal h3{font-size:1.25rem;font-weight:700;margin-bottom:.75rem}
.modal p{color:var(--text2);margin-bottom:1.5rem}
.modal-a{display:flex;gap:.75rem;justify-content:flex-end}
@media(max-width:768px){.grid{grid-template-columns:1fr}.pres-cnt{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>Irakaslea · PASAHITZA</h1>
  <div class="header-a">
    <div class="mode-switch">
      <button class="mode-btn active" onclick="switchMode('edit')">✏️ Edita</button>
      <button class="mode-btn" onclick="switchMode('coord')">🎮 Jolastu</button>
    </div>
    <a href="index.html" class="btn-small">← Hasierara</a>
  </div>
</div>

<!-- MODO EDICIÓN -->
<div class="screen active" id="screen-edit">
  <div class="layout">
    <div id="msg" class="msg"></div>
    
    <div class="grid">
      <div class="list-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
          <h2>Gurpilak (<span id="count">0</span>)</h2>
          <div>
            <button class="btn-small" onclick="exportJSON()" title="Deskargu JSON">📥</button>
            <label class="btn-small" style="cursor:pointer;margin-left:.5rem" title="Kargatu JSON">📤<input type="file" id="file-import" class="file-inp" accept=".json" onchange="importJSON(event)"></label>
          </div>
        </div>
        <div id="list"></div>
      </div>

      <div class="form-section">
        <h2 id="form-title">Gurpila berria</h2>
        
        <form class="form-g" onsubmit="saveGurpila(event)">
          <div class="form-field">
            <label>Izena</label>
            <input type="text" id="name" class="input" placeholder="Adibidea: Euskal Historian" maxlength="100" required>
          </div>

          <div class="form-field">
            <label>Deskribapena</label>
            <input type="text" id="desc" class="input" placeholder="Laburra" maxlength="200">
          </div>

          <div class="form-field">
            <label>Galderak</label>
            <div class="questions">
              <div id="questions-list"></div>
              <button type="button" class="add-q" onclick="addQuestion()">+ Galdera gehitu</button>
            </div>
          </div>

          <div class="buttons">
            <button type="button" class="btn btn-ghost" onclick="clearForm()">Garbitu</button>
            <button type="submit" class="btn">Gorde</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- MODO COORDINADOR -->
<div class="screen" id="screen-coord">
  <div class="layout">
    <h2 style="margin-bottom:1.5rem" id="coord-title">Gurpila aukeratu</h2>
    <div id="coord-select" class="coord-grid"></div>
      <div id="coord-play" style="display:none">
        <div class="pres">
          <div class="pres-h">
            <h1 class="pres-title" id="coord-name">—</h1>
          </div>
          <div class="pres-cnt">
            <div class="pres-qr">
              <div class="pres-qr-box"><canvas id="coord-qrc" width="200" height="200"></canvas></div>
              <div class="pres-url" id="coord-pu">—</div>
              <div class="code-box">
                <div class="code-label">Saioak kodea</div>
                <div class="code" id="coord-pc">—</div>
              </div>
            </div>
            <div class="coord-rules">
              <div class="rule"><div class="rule-num">1</div><div class="rule-txt">Ikasleak webgunean sartu eta izena idatzi</div></div>
              <div class="rule"><div class="rule-num">2</div><div class="rule-txt">Pantailan ikusten duten saioen kodea idatzi</div></div>
              <div class="rule"><div class="rule-num">3</div><div class="rule-txt">Koordinatzaileak saioa hasten duenean, hasi zaitez</div></div>
              <button class="btn" style="margin-top:1rem" onclick="startScore()">Sailkapena hasi</button>
            </div>
          </div>
        </div>
      </div>

      <div id="scoring" style="display:none">
        <h2 style="margin-bottom:1.5rem">Sailkapena <span id="rc" style="font-size:1rem;color:var(--text2);font-weight:400">(0 lehiakide)</span></h2>
        <div class="ranking" id="rl"><div class="r-empty">Konektatzen…</div></div>
        <div style="display:flex;gap:1rem;margin-top:1rem">
          <button class="btn btn-secondary" onclick="backToSelect()">← Atzera</button>
          <button class="btn" onclick="savePartida()" style="background:#059669">💾 Gorde emaitzak</button>
          <button class="btn" onclick="clrSes()">Saioa hustu</button>
        </div>
      </div>
  </div>
</div>

<div class="modal-o" id="m">
  <div class="modal">
    <h3 id="mt">—</h3>
    <p id="mm">—</p>
    <div class="modal-a">
      <button class="btn btn-secondary" onclick="closM()">Utzi</button>
      <button class="btn" id="mconf">Baieztatu</button>
    </div>
  </div>
</div>

<script>
let db=null;
const APP={
  data:{gurpilak:[]},
  currentId:null,
  questions:[],
  saioId:null,
  ranking:[],
  listener:null,
  gurpila:null,
  
  genId(){return Math.random().toString(36).substring(2,8).toUpperCase()},
  time(s){const m=Math.floor(s/60);return `${m}:${(s%60).toString().padStart(2,'0')}`},
  save(){localStorage.setItem('pasahitza_gurpilak_editor',JSON.stringify(this.data))},
  load(){const d=localStorage.getItem('pasahitza_gurpilak_editor');if(d)this.data=JSON.parse(d)}
};

function waitForFirebase(){
  if(typeof firebase==='undefined'){setTimeout(waitForFirebase,100);return}
  const firebaseConfig={apiKey:"AIzaSyAyYzA5YwXHGAzF8WxR7sajbXmbbMavYNQ",authDomain:"pasahitza-e4435.firebaseapp.com",databaseURL:"https://pasahitza-e4435-default-rtdb.europe-west1.firebasedatabase.app",projectId:"pasahitza-e4435",storageBucket:"pasahitza-e4435.firebasestorage.app",messagingSenderId:"457685898301",appId:"1:457685898301:web:f3db124e0a746357cec654"};
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
  APP.load();
  render();
}

function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function show(msg,type='ok'){const el=document.getElementById('msg');el.textContent=msg;el.className='msg '+type+' show';setTimeout(()=>el.classList.remove('show'),4000)}

function switchMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(mode==='edit'){
    document.querySelector('.mode-btn:nth-child(1)').classList.add('active');
    document.getElementById('screen-edit').classList.add('active');
  }else{
    document.querySelector('.mode-btn:nth-child(2)').classList.add('active');
    document.getElementById('screen-coord').classList.add('active');
    renderCoord();
  }
}

function render(){
  const list=document.getElementById('list');
  document.getElementById('count').textContent=APP.data.gurpilak.length;
  if(APP.data.gurpilak.length===0){
    list.innerHTML='<p style="color:var(--text2)">Ez dago gurpilarik. Sortu berria.</p>';
    return;
  }
  list.innerHTML=APP.data.gurpilak.map(g=>`<div class="gurpila-card" onclick="editGurpila('${g.id}')"><div class="gurpila-h"><div class="gurpila-n">${esc(g.izena)}</div><div><button type="button" class="btn-small btn-del" onclick="delGurpila(event,'${g.id}')">🗑</button></div></div><div class="gurpila-desc">${esc(g.deskribapena||'')}</div><div class="gurpila-meta"><span>${g.galderak.length} galdera</span><span style="font-family:monospace">${esc(g.id)}</span></div></div>`).join('');
}

function editGurpila(id){
  const g=APP.data.gurpilak.find(x=>x.id===id);if(!g)return;
  APP.currentId=id;APP.questions=JSON.parse(JSON.stringify(g.galderak||[]));
  document.getElementById('form-title').textContent='Aldatu: '+g.izena;
  document.getElementById('name').value=g.izena;
  document.getElementById('desc').value=g.deskribapena||'';
  renderQuestions();
  document.querySelector('.mode-switch .mode-btn:nth-child(1)').click();
}

function addQuestion(){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZÑ';
  const used=APP.questions.map(q=>q.hizkia);
  let l='A';
  for(const c of letters){if(!used.includes(c)){l=c;break}}
  APP.questions.push({hizkia:l,hitza:'',definizioa:''});
  renderQuestions();
}

function renderQuestions(){
  const cont=document.getElementById('questions-list');
  if(APP.questions.length===0){cont.innerHTML='';return}
  cont.innerHTML=APP.questions.map((q,i)=>`<div class="q-item"><div class="q-letter">${esc(q.hizkia)}</div><div style="display:flex;flex-direction:column;gap:.5rem;flex:1"><input type="text" placeholder="Hitza" value="${esc(q.hitza)}" onchange="APP.questions[${i}].hitza=this.value" class="input" style="font-size:.9rem;padding:.5rem .75rem"><input type="text" placeholder="Definizioa" value="${esc(q.definizioa)}" onchange="APP.questions[${i}].definizioa=this.value" class="input" style="font-size:.85rem;padding:.5rem .75rem"><label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text2);cursor:pointer"><input type="checkbox" ${q.itsatsia?'checked':''} onchange="APP.questions[${i}].itsatsia=this.checked"> Itsatsia (letra ${esc(q.hizkia)} duen hitza)</label></div><button type="button" class="q-del-btn" onclick="APP.questions.splice(${i},1);renderQuestions()">×</button></div>`).join('');
}

function clearForm(){
  APP.currentId=null;APP.questions=[];
  document.getElementById('form-title').textContent='Gurpila berria';
  document.getElementById('name').value='';
  document.getElementById('desc').value='';
  renderQuestions();
}

function saveGurpila(ev){
  ev.preventDefault();
  const name=document.getElementById('name').value.trim();
  const desc=document.getElementById('desc').value.trim();
  if(!name){show('Idatzi izena','error');return}
  if(APP.questions.length===0){show('Gehitu gutxienez 1 galdera','error');return}
  const invalid=APP.questions.find(q=>!q.hitza.trim());
  if(invalid){show('Bete itzazu hitze guztiak','error');return}
  let g;
  if(APP.currentId){
    g=APP.data.gurpilak.find(x=>x.id===APP.currentId);
    g.izena=name;
    g.deskribapena=desc;
  }else{
    g={id:APP.genId(),izena:name,deskribapena:desc};
    APP.data.gurpilak.push(g);
  }
  g.galderak=JSON.parse(JSON.stringify(APP.questions));
  APP.save();
  render();
  clearForm();
  show('Gordetakoa!');
}

function delGurpila(ev,id){
  ev.stopPropagation();
  const g=APP.data.gurpilak.find(x=>x.id===id);
  if(!g)return;
  document.getElementById('mt').textContent='Berretsi';
  document.getElementById('mm').textContent=`Ziur "${g.izena}" ezabatzeari?`;
  const ok=document.getElementById('mconf');
  ok.onclick=()=>{
    APP.data.gurpilak=APP.data.gurpilak.filter(x=>x.id!==id);
    if(APP.currentId===id)clearForm();
    APP.save();
    render();
    closM();
    show('Ezabatakoa');
  };
  document.getElementById('m').classList.add('active');
}

function exportJSON(){
  const json=JSON.stringify({gurpilak:APP.data.gurpilak},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='gurpilak_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  show('Deskargatua!');
}

function importJSON(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.gurpilak||!Array.isArray(d.gurpilak)){show('Formatua ez da zuzena','error');return}
      APP.data.gurpilak=[...APP.data.gurpilak,...d.gurpilak];
      APP.save();
      render();
      show('Kargatua! '+d.gurpilak.length+' gurpila gehitu (guztira: '+APP.data.gurpilak.length+')');
      document.getElementById('file-import').value='';
    }catch(err){show('Akatsa: '+err.message,'error')}
  };
  reader.readAsText(file);
}

function closM(){document.getElementById('m').classList.remove('active')}
document.getElementById('mconf').addEventListener('click',()=>{});
document.getElementById('m').addEventListener('click',e=>{if(e.target===document.getElementById('m'))closM()});

// MODO COORDINADOR
function renderCoord(){
  const sel=document.getElementById('coord-select');
  const play=document.getElementById('coord-play');
  sel.style.display=APP.data.gurpilak.length>0?'grid':'none';
  play.style.display='none';
  if(APP.data.gurpilak.length===0){sel.innerHTML='<p style="color:var(--text2);grid-column:1/-1">Ez dago gurpilarik. Sortu irakaslea moduan.</p>';return}
  sel.innerHTML=APP.data.gurpilak.map(g=>`<div class="coord-card" onclick="selectGurpila('${g.id}')"><h3>${esc(g.izena)}</h3><p>${esc(g.deskribapena||'')}</p><div class="coord-card-meta"><span>${g.galderak.length} galdera</span><span style="font-family:monospace">${esc(g.id)}</span></div></div>`).join('');
}

function selectGurpila(id){
  APP.gurpila=APP.data.gurpilak.find(g=>g.id===id);
  if(!APP.gurpila)return;
  APP.saioId=APP.genId();
  APP.ranking=[];
  document.getElementById('coord-name').textContent=APP.gurpila.izena;
  document.getElementById('coord-pc').textContent=APP.saioId;
  const u=window.location.href.replace(/\/[^/]*$/,'')+'/lehiakidea.html';
  document.getElementById('coord-pu').textContent=u.replace(/^https?:\/\//,'');
  try{new QRious({element:document.getElementById('coord-qrc'),value:u,size:200,level:'M',background:'#FFF',foreground:'#0A0A0A'})}catch(e){}
  
  // Crear sesión en Firebase con estado 'itxaroten' para que alumnos puedan conectarse
  db.ref('saioak/'+APP.saioId).set({gurpila_id:APP.gurpila.id,gurpila_izena:APP.gurpila.izena,galderak:APP.gurpila.galderak,egoera:'itxaroten',hasi_unea:Date.now(),lehiakideak:{}});
  
  document.getElementById('coord-select').style.display='none';
  document.getElementById('coord-play').style.display='block';
}

function backToSelect(){
  clrSes();
  APP.gurpila=null;
  document.getElementById('coord-select').style.display='grid';
  document.getElementById('coord-play').style.display='none';
  renderCoord();
}

function startScore(){
  // Solo cambiar estado a 'jokoan' (no borrar lehiakideak)
  db.ref('saioak/'+APP.saioId+'/egoera').set('jokoan');
  const ref=db.ref('saioak/'+APP.saioId+'/lehiakideak');
  console.log('📡 Activando listener en:', 'saioak/'+APP.saioId+'/lehiakideak');
  if(APP.listener)APP.listener.off();
  APP.listener=ref.on('value',snapshot=>{
    const d=snapshot.val()||{};
    console.log('🔔 Datos recibidos de Firebase:', d);
    APP.ranking=Object.values(d).sort((a,b)=>b.puntuak!==a.puntuak?b.puntuak-a.puntuak:a.denbora-b.denbora);
    console.log('📊 Ranking actualizado:', APP.ranking);
    renderRL();
  });
  document.getElementById('coord-play').style.display='none';
  document.getElementById('scoring').style.display='block';
}

function renderRL(){
  const l=document.getElementById('rl');
  const c=document.getElementById('rc');
  c.textContent=`(${APP.ranking.length} lehiakide)`;
  if(APP.ranking.length===0){l.innerHTML='<div class="r-empty">Konektatzen…</div>';return}
  l.innerHTML=APP.ranking.map((r,i)=>`<div class="r-row"><div class="r-pos">${i+1}</div><div class="r-name">${esc(r.izena)}</div><div class="r-pts">${r.puntuak} pt</div><div class="r-time">${APP.time(r.denbora)}</div></div>`).join('');
}

async function savePartida(){
  if(!APP.ranking || APP.ranking.length===0){
    alert('Ez dago emaitzarik gordetzeko');
    return;
  }
  
  const timestamp=Date.now();
  const partidaData={
    data:new Date().toISOString(),
    gurpila_id:APP.gurpila.id,
    gurpila_izena:APP.gurpila.izena,
    participantes:{}
  };
  
  // Convertir ranking a objeto con userId como clave
  APP.ranking.forEach(r=>{
    partidaData.participantes[r.userId||'user_'+Math.random()]=r;
  });
  
  try{
    await db.ref('historial_partidas/'+timestamp).set(partidaData);
    alert('✅ Partida gordea!');
  }catch(e){
    console.error(e);
    alert('❌ Errorea gordetzean');
  }
}

function clrSes(){
  if(APP.listener)APP.listener.off();
  if(APP.saioId)db.ref('saioak/'+APP.saioId).remove();
  APP.ranking=[];
  document.getElementById('scoring').style.display='none';
  document.getElementById('coord-play').style.display='block';
}

waitForFirebase();
</script>
</body>
</html>
