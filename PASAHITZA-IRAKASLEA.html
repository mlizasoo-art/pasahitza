<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASAHITZA - Irakaslea</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .header { margin-bottom: 30px; }
        .header h1 { margin-bottom: 10px; }
        .header button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 10px; }
        .card p { color: #666; margin: 5px 0; }
        .card-buttons { margin-top: 15px; display: flex; gap: 5px; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #2196F3; color: white; }
        .btn-warning { background: #FF9800; color: white; }
        .btn-danger { background: #f44336; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 8px; width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; }
        .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: Arial; font-size: 14px; }
        .form-group textarea { min-height: 200px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2196F3; background: #f0f8ff; }
        
        .error-msg { color: #d32f2f; font-size: 13px; margin-top: 5px; }
        .success-msg { color: #388e3c; font-size: 13px; margin-top: 5px; }
        
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-save { background: #4CAF50; color: white; }
        .btn-cancel { background: #9e9e9e; color: white; }
        
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>👨‍🏫 PASAHITZA - Irakaslea</h1>
    <button onclick="abrirModal()">➕ Gurpil Berria</button>
</div>

<div id="lista-gurpils" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="titulo-modal">Gurpil Berria Sortu</h2>
            <button class="close-btn" onclick="cerrarModal()">×</button>
        </div>

        <div class="form-group">
            <label>Izenburua:</label>
            <input type="text" id="campo-nombre" placeholder="Ej: A gurpila">
            <div id="error-nombre" class="error-msg"></div>
        </div>

        <div class="form-group">
            <label>Datuak (Tabulazioaz bereizita: Letra TAB Hitza TAB Definizioa):</label>
            <textarea id="campo-datos" placeholder="A	Abere	Animalia domestiko bat&#10;B	Bakea	Gatazkaren aurkakoa"></textarea>
            <div id="error-datos" class="error-msg"></div>
        </div>

        <div class="modal-buttons">
            <button class="btn-save" onclick="guardaGurpila()">💾 GORDE</button>
            <button class="btn-cancel" onclick="cerrarModal()">Utzi</button>
        </div>
    </div>
</div>

<script>
    let todosGurpils = [];
    let editandoId = null;

    // Cargar datos al iniciar
    function cargarDatos() {
        console.log('=== cargarDatos() ===');
        const saved = localStorage.getItem('pasahitza_gurpils');
        console.log('Datos en localStorage:', saved ? 'SÍ' : 'NO');
        if (saved) {
            try {
                todosGurpils = JSON.parse(saved);
                console.log('Gurpils cargadas:', todosGurpils.length);
                console.log('IDs disponibles:', todosGurpils.map(g => g.id));
            } catch (e) {
                console.error('Error al parsear JSON:', e);
            }
        }
        renderizarLista();
    }

    // Renderizar lista de gurpilas
    function renderizarLista() {
        const container = document.getElementById('lista-gurpils');
        
        if (todosGurpils.length === 0) {
            container.innerHTML = '<div class="empty">Ez dago gurpilik oraindik. Sortu bat! ➕</div>';
            return;
        }

        container.innerHTML = todosGurpils.map(g => `
            <div class="card">
                <h3>${g.nombre}</h3>
                <p>Galderak: ${g.preguntas.length}</p>
                <div class="card-buttons">
                    <button class="btn btn-primary" data-id="${g.id}" onclick="activarGurpila(this.getAttribute('data-id'))">▶️ Aktibatu</button>
                    <button class="btn btn-warning" data-id="${g.id}" onclick="abrirModalEditar(this.getAttribute('data-id'))">✏️ Editatu</button>
                    <button class="btn btn-danger" data-id="${g.id}" onclick="borrarGurpila(this.getAttribute('data-id'))">🗑️ Ezabatu</button>
                </div>
            </div>
        `).join('');
    }

    // Abrir modal para crear
    function abrirModal() {
        editandoId = null;
        document.getElementById('titulo-modal').textContent = 'Gurpil Berria Sortu';
        document.getElementById('campo-nombre').value = '';
        document.getElementById('campo-datos').value = '';
        document.getElementById('error-nombre').textContent = '';
        document.getElementById('error-datos').textContent = '';
        document.getElementById('modal').classList.add('show');
    }

    // Abrir modal para editar
    function abrirModalEditar(id) {
        const gurpil = todosGurpils.find(g => g.id === id);
        if (!gurpil) return;
        
        editandoId = id;
        document.getElementById('titulo-modal').textContent = 'Gurpila Editatu';
        document.getElementById('campo-nombre').value = gurpil.nombre;
        document.getElementById('campo-datos').value = gurpil.preguntas
            .map(p => `${p.letra}\t${p.palabra}\t${p.definicion}`)
            .join('\n');
        document.getElementById('error-nombre').textContent = '';
        document.getElementById('error-datos').textContent = '';
        document.getElementById('modal').classList.add('show');
    }

    // Cerrar modal
    function cerrarModal() {
        document.getElementById('modal').classList.remove('show');
    }

    // GUARDAR GURPILA - FUNCIÓN PRINCIPAL
    function guardaGurpila() {
        console.log('=== guardaGurpila() LLAMADA ===');
        
        // Obtener valores
        const nombre = document.getElementById('campo-nombre').value.trim();
        const datos = document.getElementById('campo-datos').value.trim();
        
        console.log('Nombre:', nombre);
        console.log('Datos:', datos.substring(0, 100) + '...');

        // Limpiar errores
        document.getElementById('error-nombre').textContent = '';
        document.getElementById('error-datos').textContent = '';

        // Validar nombre
        if (!nombre) {
            document.getElementById('error-nombre').textContent = '❌ Izenburu bat sartu behar duzu';
            return;
        }

        // Validar datos
        if (!datos) {
            document.getElementById('error-datos').textContent = '❌ Datuak sartu behar dituzu';
            return;
        }

        // Parsear datos línea por línea
        const lineas = datos.split('\n').filter(l => l.trim());
        console.log('Lineas encontradas:', lineas.length);

        const preguntas = [];
        let erroresLinea = [];

        lineas.forEach((linea, idx) => {
            console.log(`Linea ${idx}:`, linea);
            const partes = linea.split('\t');
            console.log(`  Partes encontradas: ${partes.length}`, partes);

            if (partes.length >= 3) {
                const letra = partes[0].trim().toUpperCase();
                const palabra = partes[1].trim();
                const definicion = partes[2].trim();

                if (letra && palabra && definicion) {
                    preguntas.push({ letra, palabra, definicion });
                    console.log(`  ✓ Agregada: ${letra} - ${palabra}`);
                } else {
                    erroresLinea.push(`Linea ${idx + 1}: campos vacios`);
                }
            } else {
                erroresLinea.push(`Linea ${idx + 1}: falta separador TAB (tiene ${partes.length} partes, necesita 3)`);
            }
        });

        console.log('Total preguntas procesadas:', preguntas.length);
        console.log('Errores:', erroresLinea);

        // Validar cantidad de preguntas
        if (preguntas.length === 0) {
            document.getElementById('error-datos').textContent = 
                '❌ No se pudo procesar ninguna pregunta. Verifica el formato: LETRA(TAB)PALABRA(TAB)DEFINICION\n\n' + 
                erroresLinea.join('\n');
            return;
        }

        // Crear o actualizar gurpila
        const gurpilNuevo = {
            id: editandoId || Date.now().toString(),
            nombre: nombre,
            preguntas: preguntas,
            fechaCreacion: new Date().toISOString()
        };

        if (editandoId) {
            const idx = todosGurpils.findIndex(g => g.id === editandoId);
            if (idx >= 0) {
                todosGurpils[idx] = gurpilNuevo;
                console.log('✓ Gurpila actualizada');
            }
        } else {
            todosGurpils.push(gurpilNuevo);
            console.log('✓ Gurpila nueva creada');
        }

        // Guardar en localStorage
        localStorage.setItem('pasahitza_gurpils', JSON.stringify(todosGurpils));
        console.log('✓ Guardada en localStorage');

        // Actualizar interfaz
        cerrarModal();
        renderizarLista();
        console.log('=== FIN guardaGurpila() ===');
    }

    // Borrar gurpila - mostrar modal de confirmación
    function borrarGurpila(id) {
        console.log('borrarGurpila llamada con id:', id);
        const gurpil = todosGurpils.find(g => g.id === id);
        if (!gurpil) return;
        
        // Crear y mostrar modal
        const modalId = 'modal-confirm-' + id;
        const modalConfirm = document.createElement('div');
        modalConfirm.id = modalId;
        modalConfirm.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        `;
        
        modalConfirm.innerHTML = `
            <div style="
                background: white;
                padding: 2em;
                border-radius: 10px;
                text-align: center;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                min-width: 300px;
            ">
                <h2 style="margin-top: 0; color: #d32f2f;">⚠️ Ezabatu?</h2>
                <p style="color: #666; margin: 1em 0;">"${gurpil.nombre}"</p>
                <p style="color: #999; font-size: 0.9em;">Ezin da desegitsi.</p>
                <div style="display: flex; gap: 1em; margin-top: 2em;">
                    <button style="
                        flex: 1;
                        padding: 0.75em;
                        background: #ccc;
                        border: none;
                        border-radius: 5px;
                        cursor: pointer;
                        font-weight: bold;
                    " onclick="cerrarModalConfirm('${modalId}')">Utzi</button>
                    <button style="
                        flex: 1;
                        padding: 0.75em;
                        background: #d32f2f;
                        color: white;
                        border: none;
                        border-radius: 5px;
                        cursor: pointer;
                        font-weight: bold;
                    " onclick="confirmarBorrado('${id}', '${modalId}')">Bai, Ezabatu</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modalConfirm);
    }

    // Cerrar modal de confirmación
    function cerrarModalConfirm(modalId) {
        console.log('Cerrando modal:', modalId);
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.remove();
        }
    }

    // Confirmar y ejecutar borrado
    function confirmarBorrado(id, modalId) {
        console.log('Confirmado borrado de:', id);
        todosGurpils = todosGurpils.filter(g => g.id !== id);
        localStorage.setItem('pasahitza_gurpils', JSON.stringify(todosGurpils));
        
        // Cerrar modal
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.remove();
        }
        
        // Recargar lista
        renderizarLista();
        console.log('✓ Gurpila borrada');
    }

    // Activar gurpila - mostrar pantalla con código
    function activarGurpila(id) {
        console.log('activarGurpila llamada con id:', id);
        const gurpil = todosGurpils.find(g => g.id === id);
        
        if (gurpil) {
            console.log('✓ Gurpila encontrada:', gurpil.nombre);
            const codigo = 'PAS' + Math.random().toString(36).substr(2, 5).toUpperCase();
            
            // Guardar en sessionStorage
            sessionStorage.setItem('gurpila_activa', JSON.stringify({
                id: gurpil.id,
                nombre: gurpil.nombre,
                preguntas: gurpil.preguntas,
                codigo: codigo,
                timestamp: Date.now()
            }));
            
            mostrarPantallaActivo(gurpil.nombre, codigo);
        } else {
            console.log('✗ Gurpila NO encontrada');
        }
    }

    // Mostrar pantalla con código de sesión (tipo Kahoot)
    function mostrarPantallaActivo(nombre, codigo) {
        const modal = document.getElementById('modal');
        modal.classList.remove('show');
        
        // Guardar sesión activa en localStorage para sincronización
        const gurpilActiva = todosGurpils.find(g => g.nombre === nombre);
        if (gurpilActiva) {
            const sesion = {
                codigo: codigo,
                nombre: nombre,
                preguntas: gurpilActiva.preguntas,
                timestamp: Date.now()
            };
            localStorage.setItem('pasahitza_sesion_activa', JSON.stringify(sesion));
            
            // Notificar a alumnos por BroadcastChannel
            if (window.bc) {
                window.bc.postMessage({
                    tipo: 'sesion-activa',
                    codigo: codigo,
                    nombre: nombre
                });
            }
        }
        
        const pantalla = document.createElement('div');
        pantalla.id = 'pantalla-activo';
        pantalla.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 2em;
            color: white;
            font-family: Arial, sans-serif;
            overflow-y: auto;
        `;
        
        pantalla.innerHTML = `
            <div style="width: 100%;">
                <button onclick="cerrarPantallaActivo()" style="
                    padding: 0.75em 1.5em;
                    font-size: 1em;
                    background: rgba(255,255,255,0.2);
                    color: white;
                    border: 2px solid white;
                    border-radius: 10px;
                    cursor: pointer;
                    font-weight: bold;
                    margin-bottom: 1em;
                ">← Itzuli Dashboard</button>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2em; width: 100%;">
                    <!-- Código -->
                    <div style="text-align: center;">
                        <h1 style="font-size: 2.5em; margin: 0 0 0.5em;">🎮 PASAHITZA</h1>
                        <h2 style="font-size: 1.5em; margin: 0 0 1em;">${nombre}</h2>
                        <p style="font-size: 1em; opacity: 0.9; margin: 1em 0;">Ikasleak sartu ditzaten kodea:</p>
                        <div style="
                            background: rgba(255,255,255,0.2);
                            padding: 2em;
                            border-radius: 15px;
                            border: 3px solid white;
                            margin: 1em 0;
                            backdrop-filter: blur(10px);
                        ">
                            <div style="
                                font-size: 4em;
                                font-weight: bold;
                                letter-spacing: 0.2em;
                                font-family: 'Courier New', monospace;
                                color: #fff;
                            ">${codigo}</div>
                        </div>
                    </div>
                    
                    <!-- Alumnos conectados -->
                    <div style="
                        background: rgba(255,255,255,0.1);
                        padding: 1.5em;
                        border-radius: 15px;
                        backdrop-filter: blur(10px);
                    ">
                        <h3 style="margin-top: 0;">👥 Ikasleak Konektatuta</h3>
                        <div id="lista-alumnos-activo" style="
                            max-height: 300px;
                            overflow-y: auto;
                        ">
                            <p style="opacity: 0.7;">Itxaroten...</p>
                        </div>
                        <button onclick="iniciarJuegoActivo()" style="
                            width: 100%;
                            margin-top: 1em;
                            padding: 1em;
                            font-size: 1.2em;
                            background: #4CAF50;
                            color: white;
                            border: none;
                            border-radius: 10px;
                            cursor: pointer;
                            font-weight: bold;
                        ">▶️ JOKOA HASI</button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.appendChild(pantalla);
        
        // Inicializar BroadcastChannel para profesor
        inicializarBroadcastProfesor(codigo);
        
        // Actualizar lista cada segundo
        window.intervaloAlumnos = setInterval(() => {
            actualizarListaAlumnosActivo();
        }, 1000);
    }

    // Inicializar BroadcastChannel para profesor
    function inicializarBroadcastProfesor(codigo) {
        if (window.bc) {
            window.bc.close();
        }
        window.bc = new BroadcastChannel('pasahitza-' + codigo);
        window.alumnosConectados = [];
        
        window.bc.onmessage = (evento) => {
            const { tipo, alumno } = evento.data;
            if (tipo === 'alumno-conectado') {
                if (!window.alumnosConectados.find(a => a.id === alumno.id)) {
                    window.alumnosConectados.push({
                        ...alumno,
                        tiempo: 0
                    });
                    console.log('Alumno conectado:', alumno.nombre);
                }
            } else if (tipo === 'respuesta-enviada') {
                const alum = window.alumnosConectados.find(a => a.id === evento.data.alumnoId);
                if (alum) {
                    alum.puntos = evento.data.puntos;
                    alum.aciertos = evento.data.aciertos;
                    alum.tiempo = evento.data.tiempo;
                    console.log('Alumno actualizado:', alum.nombre, 'Tiempo:', alum.tiempo);
                }
            } else if (tipo === 'juego-terminado') {
                // Alumno terminó: enviar ranking a todos
                console.log('Alumno terminado:', evento.data.nombre);
                enviarRankingAAlumnos();
            }
        };
        
        function enviarRankingAAlumnos() {
            if (!window.bc) return;
            
            // Crear ranking ordenado
            const rankingOrdenado = [...window.alumnosConectados]
                .sort((a, b) => {
                    if (b.aciertos !== a.aciertos) {
                        return b.aciertos - a.aciertos;
                    }
                    return (a.tiempo || 0) - (b.tiempo || 0);
                })
                .map(a => ({
                    nombre: a.nombre,
                    aciertos: a.aciertos || 0,
                    tiempo: a.tiempo || 0
                }));
            
            window.bc.postMessage({
                tipo: 'ranking-enviado',
                ranking: rankingOrdenado
            });
            
            console.log('Ranking enviado a alumnos:', rankingOrdenado);
        }
    }

    // Actualizar lista de alumnos en pantalla aktibo
    function actualizarListaAlumnosActivo() {
        const lista = document.getElementById('lista-alumnos-activo');
        if (!lista) return;
        
        if (window.alumnosConectados.length === 0) {
            lista.innerHTML = '<p style="opacity: 0.7;">Itxaroten...</p>';
            return;
        }
        
        // Ordenar: Aciertos DESC, Tiempo ASC
        const ordenados = [...window.alumnosConectados].sort((a, b) => {
            if (b.aciertos !== a.aciertos) {
                return b.aciertos - a.aciertos; // Más aciertos primero
            }
            return (a.tiempo || 0) - (b.tiempo || 0); // Menos tiempo gana
        });
        
        lista.innerHTML = ordenados.map((a, i) => `
            <div style="
                background: rgba(255,255,255,0.1);
                padding: 0.75em;
                margin-bottom: 0.5em;
                border-radius: 8px;
                border-left: 3px solid ${i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : '#4CAF50'};
                ${i < 3 ? 'font-weight: bold;' : ''}
            ">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.'} ${a.nombre}</span>
                </div>
                <div style="font-size: 0.9em; opacity: 0.8;">
                    Zuzenak: ${a.aciertos || 0} | Denbora: ${formatarTiempoRanking(a.tiempo || 0)}
                </div>
            </div>
        `).join('');
    }
    
    // Función para formatear tiempo
    function formatarTiempoRanking(segundos) {
        const mins = Math.floor(segundos / 60);
        const secs = segundos % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Iniciar juego
    function iniciarJuegoActivo() {
        if (window.bc) {
            window.bc.postMessage({
                tipo: 'jogo-hasita'
            });
        }
        console.log('Jokoa hasita');
    }

    // Cerrar pantalla activo
    function cerrarPantallaActivo() {
        const pantalla = document.getElementById('pantalla-activo');
        if (pantalla) {
            pantalla.remove();
        }
        
        // Limpiar intervalos y BroadcastChannel
        if (window.intervaloAlumnos) {
            clearInterval(window.intervaloAlumnos);
        }
        if (window.bc) {
            window.bc.close();
            window.bc = null;
        }
        
        // Limpiar sesión activa
        localStorage.removeItem('pasahitza_sesion_activa');
        
        cargarDatos();
    }

    // Inicializar al cargar la página
    cargarDatos();
</script>

</body>
</html>
